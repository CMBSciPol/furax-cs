version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      - mkdir -p docs/notebooks
      - cp -r notebooks/*.ipynb docs/notebooks/

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: requirements.txt
    - requirements: docs/requirements.txt
    - method: pip
      path: .
      extra_requirements:
        - docs
